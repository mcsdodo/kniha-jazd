name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check if only docs/config files changed (skip integration tests if so)
  check-changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.check.outputs.has-code-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: check
        uses: ./.github/actions/check-file-changes
        with:
          # Files that DON'T require integration tests (docs, config, planning, CI)
          safe-patterns: '^(.*\.md|_tasks/.*|\.claude/.*|\.github/.*|docs/.*)$'

  # Backend tests - fast, run on all platforms
  # Skip on main if only docs/config changed; always run on PRs
  backend-tests:
    name: Backend Tests (${{ matrix.platform }})
    needs: check-changes
    if: github.event_name == 'pull_request' || needs.check-changes.outputs.run_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux: Install WebKitGTK build dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Run backend tests
        working-directory: src-tauri
        run: cargo test

  # Integration tests - build once, then run tiers in parallel
  # This gives faster feedback than sequential execution (~14 min vs ~20 min)
  # Skipped if only docs/config files changed
  integration-build:
    name: Integration Build
    needs: check-changes
    if: needs.check-changes.outputs.run_tests == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (debug)
        run: npm run tauri build -- --debug --config src-tauri/tauri.conf.dev.json

      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: debug-binary
          path: src-tauri/target/debug/kniha-jazd-desktop.exe
          retention-days: 1

  integration-tests:
    name: Integration Tests (${{ matrix.tier_name }})
    needs: [check-changes, integration-build]
    if: needs.check-changes.outputs.run_tests == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: '1'
            tier_name: 'Tier 1'
          - tier: '2'
            tier_name: 'Tier 2'
          - tier: '3'
            tier_name: 'Tier 3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Edge WebDriver
        shell: pwsh
        run: |
          # Get WebView2 version to determine major version
          $webview2Key = Get-ItemProperty -Path "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}" -ErrorAction SilentlyContinue
          if ($webview2Key -and $webview2Key.pv) {
            $webview2Version = $webview2Key.pv
          } else {
            $webview2Key = Get-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}" -ErrorAction SilentlyContinue
            $webview2Version = $webview2Key.pv
          }
          Write-Host "WebView2 runtime version: $webview2Version"

          # Extract major version and get latest compatible driver version
          $majorVersion = $webview2Version.Split('.')[0]
          $latestReleaseUrl = "https://msedgedriver.microsoft.com/LATEST_RELEASE_${majorVersion}_WINDOWS"
          Write-Host "Fetching latest driver version from: $latestReleaseUrl"
          $response = Invoke-WebRequest -Uri $latestReleaseUrl -UseBasicParsing
          # Response is UTF-16 LE encoded with BOM - decode and strip BOM character (U+FEFF)
          $decoded = [System.Text.Encoding]::Unicode.GetString($response.Content)
          $driverVersion = $decoded.TrimStart([char]0xFEFF).Trim()
          Write-Host "Latest EdgeDriver version for major $majorVersion`: $driverVersion"

          # Download the driver
          $driverUrl = "https://msedgedriver.microsoft.com/$driverVersion/edgedriver_win64.zip"
          Write-Host "Downloading EdgeDriver from: $driverUrl"
          Invoke-WebRequest -Uri $driverUrl -OutFile edgedriver.zip -TimeoutSec 60

          Expand-Archive -Path edgedriver.zip -DestinationPath edgedriver -Force
          echo "$PWD\edgedriver" >> $env:GITHUB_PATH
          Write-Host "EdgeDriver $driverVersion installed successfully"

      - name: Install npm dependencies
        run: npm ci

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Download debug binary
        uses: actions/download-artifact@v4
        with:
          name: debug-binary
          path: src-tauri/target/debug

      - name: Run integration tests (${{ matrix.tier_name }})
        env:
          TAURI_BINARY: src-tauri/target/debug/kniha-jazd-desktop.exe
          TIER: ${{ matrix.tier }}
          PARALLEL_TIERS: 'true'
        run: npm run test:integration

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-screenshots-${{ matrix.tier_name }}
          path: tests/integration/screenshots/
          if-no-files-found: ignore

  # Server-mode integration tests (Chrome against embedded HTTP server)
  # Runs Tier 1 only — same specs as Tauri tests but via browser + RPC
  integration-test-server:
    name: Integration Tests (Server/Chrome) - Tier 1
    needs: [check-changes, integration-build]
    if: needs.check-changes.outputs.run_tests == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install npm dependencies
        run: npm ci

      - name: Download debug binary
        uses: actions/download-artifact@v4
        with:
          name: debug-binary
          path: src-tauri/target/debug

      - name: Build frontend
        run: npm run build

      - name: Run server integration tests (Tier 1)
        env:
          TIER: '1'
          WDIO_SERVER_MODE: '1'
          KNIHA_JAZD_SERVER_AUTOSTART: '1'
        run: npm run test:integration:server

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-screenshots-server
          path: tests/integration/screenshots/
          if-no-files-found: ignore

  # Docker image build — runs once, then all tier matrix jobs reuse the image artifact.
  # Independent of integration-build (Tauri-Windows): the Docker image builds its own
  # release `web` binary in-stage and runs on Linux.
  integration-build-docker:
    name: Docker Image Build
    needs: check-changes
    if: needs.check-changes.outputs.run_tests == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          tags: kniha-jazd-web:test
          outputs: type=docker,dest=/tmp/kniha-jazd-web.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/kniha-jazd-web.tar
          retention-days: 1

  # Docker integration tests (Chrome against containerized web binary)
  # Mirrors the Tauri integration-tests matrix: one job per tier, in parallel.
  integration-test-docker:
    name: Integration Tests (Docker/Chrome - ${{ matrix.tier_name }})
    needs: [check-changes, integration-build-docker]
    if: needs.check-changes.outputs.run_tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: '1'
            tier_name: 'Tier 1'
          - tier: '2'
            tier_name: 'Tier 2'
          - tier: '3'
            tier_name: 'Tier 3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install npm dependencies
        run: npm ci

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/kniha-jazd-web.tar

      - name: Start container
        run: |
          mkdir -p data
          docker run -d --name kniha-jazd-web \
            -p 3456:3456 \
            -v "$PWD/data:/data" \
            -e KNIHA_JAZD_DATA_DIR=/data \
            -e DATABASE_PATH=/data/kniha-jazd.db \
            -e PORT=3456 \
            kniha-jazd-web:test

      - name: Wait for server health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3456/health >/dev/null; then
              echo "Server is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server did not become healthy within 60s"
          docker logs kniha-jazd-web
          exit 1

      - name: Run Docker integration tests (${{ matrix.tier_name }})
        env:
          TIER: ${{ matrix.tier }}
          WDIO_SERVER_MODE: '1'
          WDIO_EXTERNAL_SERVER: '1'
          PARALLEL_TIERS: 'true'
        run: npm run test:integration:docker

      - name: Show container logs on failure
        if: failure()
        run: docker logs kniha-jazd-web || true

      - name: Tear down container
        if: always()
        run: docker rm -f kniha-jazd-web || true

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-screenshots-docker-${{ matrix.tier_name }}
          path: tests/integration/screenshots/
          if-no-files-found: ignore

  # Playwright smoke tests - disabled in CI
  # These tests need a running Vite dev server which requires complex setup.
  # Run locally with: npm run test:e2e
  #
  # e2e-tests:
  #   name: E2E Smoke Tests
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with: { node-version: 20, cache: 'npm' }
  #     - run: npm ci
  #     - run: npx playwright install --with-deps chromium
  #     - run: npm run test:e2e
